<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visible Human: GL Slicing</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }

      #loading {
        position: fixed; inset: 0;
        background: #111;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 100;
        color: #aaa; font: 0.85rem sans-serif; gap: 1rem;
      }
      #progress-track { width: 200px; height: 2px; background: #333; border-radius: 1px; }
      #progress-fill {
        height: 100%; width: 0%; background: #888;
        border-radius: 1px; transition: width 0.05s;
      }

      #ui {
        position: fixed; bottom: 1.25rem; left: 50%;
        transform: translateX(-50%);
        display: flex; gap: 1.5rem;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(6px);
        padding: 0.6rem 1rem;
        border-radius: 10px;
        color: rgba(255,255,255,0.6);
        font: 0.75rem sans-serif;
        z-index: 10;
      }
      .slider-row { display: flex; align-items: center; gap: 0.5rem; }
      .slider-row span { width: 4rem; text-align: right; }
      .slider-row input[type=range] {
        width: 100px; height: 2px;
        accent-color: rgba(255,255,255,0.7);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <span>Loading&hellip;</span>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>

    <div id="ui">
      <div class="slider-row"><span>Axial</span>   <input id="slider-k" type="range" min="0" max="233" value="117"/></div>
      <div class="slider-row"><span>Coronal</span>  <input id="slider-j" type="range" min="0" max="511" value="256"/></div>
      <div class="slider-row"><span>Sagittal</span> <input id="slider-i" type="range" min="0" max="511" value="256"/></div>
    </div>

    <script src="./src/index.ts" type="module"></script>
  </body>
</html>
